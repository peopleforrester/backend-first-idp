# ABOUTME: Working CacheInstance claim — Redis for the checkout team.
# ABOUTME: Demonstrates the golden path for cache resources.
apiVersion: platform.kubecon.io/v1alpha1
kind: CacheInstanceClaim
metadata:
  name: checkout-session-cache
  namespace: checkout
  labels:
    team: checkout
spec:
  size: small
  region: eu-west-1
  team: checkout
  engine: redis
