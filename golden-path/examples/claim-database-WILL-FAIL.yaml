# ABOUTME: Deliberately failing claim — triggers multiple Kyverno policy violations.
# ABOUTME: checkout in us-west-2 (region), large (size cap), missing team label.
#
# Violations:
#   1. region-enforcement: checkout restricted to EU only (PCI-DSS)
#   2. size-caps: checkout capped at medium, requesting large
#   3. required-labels: missing team label in metadata.labels
apiVersion: platform.kubecon.io/v1alpha1
kind: DatabaseInstanceClaim
metadata:
  name: checkout-db-bad
  namespace: checkout
spec:
  size: large
  region: us-west-2
  team: checkout
