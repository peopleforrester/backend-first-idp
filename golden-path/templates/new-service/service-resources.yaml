# ABOUTME: Scaffold template for new service onboarding — copy and fill in CHANGEME values.
# ABOUTME: Provides a starting point for teams requesting platform resources.
apiVersion: platform.kubecon.io/v1alpha1
kind: DatabaseInstanceClaim
metadata:
  name: CHANGEME-db # Replace with your service name
  namespace: CHANGEME # Replace with your team namespace
spec:
  size: small # small | medium | large
  region: eu-west-1 # eu-west-1 | eu-central-1 | us-east-1 | us-west-2
  team: CHANGEME # Your team name (checkout, payments, analytics, platform)
  engine: postgres # postgres | mysql
  highAvailability: false # Set to true for production workloads
  backupRetentionDays: 7 # 1-35 days
