# ABOUTME: Test resource that should FAIL size caps — checkout requesting large.
# ABOUTME: checkout team is capped at medium, so large is denied.
apiVersion: platform.kubecon.io/v1alpha1
kind: DatabaseInstanceClaim
metadata:
  name: checkout-db-too-big
  namespace: checkout
  labels:
    team: checkout
spec:
  size: large
  region: eu-west-1
  team: checkout
