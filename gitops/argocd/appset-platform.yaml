# ABOUTME: ArgoCD v3 ApplicationSets — platform components, policies, teams, observability.
# ABOUTME: 4 ApplicationSets covering the full platform delivery pipeline.

# All sources use targetRevision: HEAD so each fork tracks its own default
# branch. Override per environment by patching this file in a kustomize
# overlay (gitops/kustomize/overlays/<env>/) — for example, pin to a tag
# in production while leaving staging on HEAD.

# --- 1. Platform Components ApplicationSet ---
# Deploys XRDs and cloud-specific compositions per cluster based on provider label.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-components
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: provider
              operator: In
              values:
                - aws
                - gcp
                - azure
  template:
    metadata:
      name: "platform-{{.name}}"
      labels:
        app.kubernetes.io/part-of: platform
        platform.kubecon.io/component: infrastructure
    spec:
      project: platform
      source:
        repoURL: https://github.com/peopleforrester/backend-first-idp.git
        targetRevision: HEAD
        path: "gitops/kustomize/overlays/{{.metadata.labels.provider}}"
      destination:
        server: "{{.server}}"
        namespace: crossplane-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 3
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
---
# --- 2. Policy Promotion ApplicationSet ---
# Deploys Kyverno policies per cluster based on environment label.
# dev clusters get Audit mode, staging gets mixed, production gets Enforce.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-policies
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: environment
              operator: In
              values:
                - dev
                - staging
                - production
  template:
    metadata:
      name: "policies-{{.name}}"
      labels:
        app.kubernetes.io/part-of: platform
        platform.kubecon.io/component: policies
    spec:
      project: platform
      source:
        repoURL: https://github.com/peopleforrester/backend-first-idp.git
        targetRevision: HEAD
        path: "policies/kyverno/promotion/{{.metadata.labels.environment}}"
      destination:
        server: "{{.server}}"
        namespace: kyverno
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
---
# --- 3. Team Claims ApplicationSet ---
# Scans for team claims committed to the repo via GitOps.
# Each team's claims/ directory becomes an ArgoCD Application.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: team-claims
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/peopleforrester/backend-first-idp.git
        revision: HEAD
        directories:
          - path: "teams/*/claims"
  template:
    metadata:
      name: "claims-{{index .path.segments 1}}"
      labels:
        app.kubernetes.io/part-of: teams
        platform.kubecon.io/component: claims
        team: "{{index .path.segments 1}}"
    spec:
      project: teams
      source:
        repoURL: https://github.com/peopleforrester/backend-first-idp.git
        targetRevision: HEAD
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{index .path.segments 1}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
---
# --- 4. Observability Stack ApplicationSet ---
# Deploys OTel collectors, Prometheus rules, and ServiceMonitors.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-observability
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            platform.kubecon.io/observability: "true"
  template:
    metadata:
      name: "observability-{{.name}}"
      labels:
        app.kubernetes.io/part-of: platform
        platform.kubecon.io/component: observability
    spec:
      project: platform
      sources:
        - repoURL: https://github.com/peopleforrester/backend-first-idp.git
          targetRevision: HEAD
          path: observability/opentelemetry
        - repoURL: https://github.com/peopleforrester/backend-first-idp.git
          targetRevision: HEAD
          path: observability/prometheus/platform-rules
        - repoURL: https://github.com/peopleforrester/backend-first-idp.git
          targetRevision: HEAD
          path: observability/prometheus/service-monitors
      destination:
        server: "{{.server}}"
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
