# ABOUTME: GCP kustomize overlay — base resources plus all GCP compositions.
# ABOUTME: Applied to clusters labeled provider=gcp by the platform ApplicationSet.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../../../platform-api/compositions/gcp/database-small.yaml
  - ../../../../platform-api/compositions/gcp/cache-small.yaml
  - ../../../../platform-api/compositions/gcp/message-queue-small.yaml
  - ../../../../platform-api/compositions/gcp/object-storage.yaml
  - ../../../../platform-api/compositions/gcp/cdn-distribution.yaml
  - ../../../../platform-api/compositions/gcp/dns-record.yaml
  - ../../../../platform-api/compositions/gcp/namespace.yaml
