# ABOUTME: ClusterSecretStore for Azure Key Vault using Workload Identity (OIDC).
# ABOUTME: Provides cluster-wide access to Azure secrets for all team namespaces.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-key-vault
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://CHANGEME.vault.azure.net
      serviceAccountRef:
        name: external-secrets-sa
        namespace: external-secrets
