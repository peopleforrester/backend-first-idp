# ABOUTME: ExternalSecret for Crossplane provider authentication credentials.
# ABOUTME: Syncs cloud provider auth tokens from secret manager into crossplane-system.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: provider-credentials
  namespace: crossplane-system
  labels:
    platform.kubecon.io/secret-type: provider
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: provider-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        credentials: "{{ .credentials }}"
  data:
    - secretKey: credentials
      remoteRef:
        key: platform/crossplane/provider-credentials
        property: credentials
