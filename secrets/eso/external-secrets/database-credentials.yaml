# ABOUTME: ExternalSecret template for database connection credentials.
# ABOUTME: Syncs DB username/password/endpoint from cloud secret manager into K8s Secrets.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: crossplane-system
  labels:
    platform.kubecon.io/secret-type: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        endpoint: "{{ .endpoint }}"
        port: "{{ .port }}"
  data:
    - secretKey: username
      remoteRef:
        key: platform/database/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: platform/database/credentials
        property: password
    - secretKey: endpoint
      remoteRef:
        key: platform/database/credentials
        property: endpoint
    - secretKey: port
      remoteRef:
        key: platform/database/credentials
        property: port
