# ABOUTME: ExternalSecret for platform TLS certificates.
# ABOUTME: Syncs wildcard cert from secret manager for platform ingress endpoints.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tls-certificates
  namespace: crossplane-system
  labels:
    platform.kubecon.io/secret-type: tls
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: platform-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .certificate }}"
        tls.key: "{{ .private_key }}"
  data:
    - secretKey: certificate
      remoteRef:
        key: platform/tls/wildcard
        property: certificate
    - secretKey: private_key
      remoteRef:
        key: platform/tls/wildcard
        property: private_key
