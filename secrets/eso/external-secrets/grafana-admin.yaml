# ABOUTME: ExternalSecret for Grafana admin credentials, consumed by kube-prometheus-stack.
# ABOUTME: Sourced from the cloud-provider secret manager via the platform's ClusterSecretStore.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  # kube-prometheus-stack installs Grafana into the same namespace it runs in
  # (set by the bootstrap helm install: --namespace observability).
  namespace: observability
  labels:
    platform.kubecon.io/secret-type: grafana-admin
    app.kubernetes.io/component: grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    # Provider-specific store name. Bootstrap applies the matching store from
    # secrets/eso/cluster-secret-store-<provider>.yaml; replace with
    # gcp-secret-manager or azure-key-vault on those clouds.
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
    template:
      type: Opaque
      # Keys MUST match values-platform.yaml grafana.admin.userKey / passwordKey.
      data:
        admin-user: "{{ .admin_user }}"
        admin-password: "{{ .admin_password }}"
  data:
    - secretKey: admin_user
      remoteRef:
        key: platform/grafana/admin
        property: username
    - secretKey: admin_password
      remoteRef:
        key: platform/grafana/admin
        property: password
