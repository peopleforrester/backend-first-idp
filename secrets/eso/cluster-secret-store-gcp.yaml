# ABOUTME: ClusterSecretStore for GCP Secret Manager using Workload Identity.
# ABOUTME: Provides cluster-wide access to GCP secrets for all team namespaces.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: CHANGEME-project-id
      auth:
        workloadIdentity:
          clusterLocation: europe-west1
          clusterName: platform-cluster
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
