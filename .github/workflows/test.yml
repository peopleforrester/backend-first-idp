# ABOUTME: CI pipeline — runs full test suite on every push and pull request.
# ABOUTME: Validates YAML, shell scripts, Kyverno policies, XRDs, compositions, and structure.
name: Test Suite

on:
  push:
    branches: [main, staging, v2-rebuild]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Action versions pinned to SHA for supply-chain security
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"

      - name: Install Python dependencies
        run: pip install yamllint pyyaml

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install Kyverno CLI
        run: |
          curl -sSLO "https://github.com/kyverno/kyverno/releases/download/v1.17.1/kyverno-cli_v1.17.1_linux_x86_64.tar.gz"
          tar -xzf kyverno-cli_v1.17.1_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/
          kyverno version

      - name: Run YAML lint
        run: make test-yaml

      - name: Run shellcheck
        run: make test-shell

      - name: Run Kyverno policy tests
        run: make test-kyverno

      - name: Run XRD validation
        run: make test-xrd

      - name: Run composition validation
        run: make test-compositions

      - name: Run golden path tests
        run: make test-golden-path

      - name: Run observability tests
        run: make test-observability

      - name: Run ESO tests
        run: make test-eso

      - name: Run scale tests
        run: make test-scale

      - name: Run structure tests
        run: make test-structure

      - name: Run Go CLI tests
        run: cd cli && go test ./... -v
