# ABOUTME: Upbound provider-family-azure with ProviderConfig using OIDC (Workload Identity).
# ABOUTME: Requires AKS Workload Identity federation for the Crossplane service account.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-family-azure
spec:
  package: xpkg.upbound.io/upbound/provider-family-azure:v1.17.0
  runtimeConfigRef:
    name: default
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-azure-dbforpostgresql
spec:
  package: xpkg.upbound.io/upbound/provider-azure-dbforpostgresql:v1.17.0
  runtimeConfigRef:
    name: default
---
# ProviderConfig using Azure Workload Identity (OIDC federation)
# The crossplane-system ServiceAccount must have Azure Workload Identity annotations.
apiVersion: azure.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: azure-provider
spec:
  credentials:
    source: OIDCTokenFile
  subscriptionID: CHANGEME-subscription-id
  tenantID: CHANGEME-tenant-id
