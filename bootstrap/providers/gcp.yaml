# ABOUTME: Upbound provider-family-gcp with ProviderConfig using Workload Identity.
# ABOUTME: Requires GKE Workload Identity binding for the Crossplane service account.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-family-gcp
spec:
  package: xpkg.upbound.io/upbound/provider-family-gcp:v1.17.0
  runtimeConfigRef:
    name: default
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-gcp-sql
spec:
  package: xpkg.upbound.io/upbound/provider-gcp-sql:v1.17.0
  runtimeConfigRef:
    name: default
---
# ProviderConfig using GKE Workload Identity
# The crossplane-system ServiceAccount must be bound to a GCP IAM service account.
apiVersion: gcp.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: gcp-provider
spec:
  projectID: CHANGEME-project-id
  credentials:
    source: InjectedIdentity
