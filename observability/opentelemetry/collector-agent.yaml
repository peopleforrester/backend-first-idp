# ABOUTME: OpenTelemetry Collector in DaemonSet mode — per-node agent for metrics and traces.
# ABOUTME: Receives OTLP and Prometheus scrape data, forwards to gateway collector.
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-agent
  namespace: observability
spec:
  mode: daemonset
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: otel-agent
              scrape_interval: 30s
              static_configs:
                - targets:
                    - localhost:8888
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          network: {}

    processors:
      batch:
        send_batch_size: 1024
        timeout: 5s
      memory_limiter:
        check_interval: 5s
        limit_mib: 512
        spike_limit_mib: 128
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.node.name
          labels:
            - tag_name: team
              key: team
              from: namespace
      resource:
        attributes:
          - key: platform.kubecon.io/collector
            value: agent
            action: upsert

    exporters:
      otlp:
        endpoint: otel-gateway.observability.svc.cluster.local:4317
        # DEMO: In production, configure mTLS between agent and gateway.
        # Insecure transport used here for demo simplicity.
        tls:
          insecure: true
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - batch
          exporters:
            - otlp
        metrics:
          receivers:
            - otlp
            - prometheus
            - hostmetrics
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - batch
          exporters:
            - otlp
