# ABOUTME: AWS Composition for ObjectStorage — maps platform API to S3 bucket + policy.
# ABOUTME: Uses Pipeline mode with function-patch-and-transform.
# NOTE: Illustrative composition for the reference architecture.
# Connection-secret extraction (writeConnectionSecretToRef plumbing through
# managed resources) is intentionally not wired — this composition is for
# study, not for direct deployment to a real cluster.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: object-storage-aws
  labels:
    provider: aws
    crossplane.io/xrd: xobjectstorages.platform.kubecon.io
spec:
  compositeTypeRef:
    apiVersion: platform.kubecon.io/v1alpha1
    kind: ObjectStorage
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: s3-bucket
            base:
              apiVersion: s3.aws.upbound.io/v1beta2
              kind: Bucket
              spec:
                forProvider:
                  forceDestroy: false
                providerConfigRef:
                  name: aws-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.region
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.tags["team"]
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.bucketDomainName
                toFieldPath: status.endpoint

          - name: s3-bucket-versioning
            base:
              apiVersion: s3.aws.upbound.io/v1beta1
              kind: BucketVersioning
              spec:
                forProvider:
                  bucketSelector:
                    matchControllerRef: true
                  versioningConfiguration:
                    - status: Suspended
                providerConfigRef:
                  name: aws-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.versioning
                toFieldPath: spec.forProvider.versioningConfiguration[0].status
                transforms:
                  - type: map
                    map:
                      "true": Enabled
                      "false": Suspended

          - name: s3-bucket-encryption
            base:
              apiVersion: s3.aws.upbound.io/v1beta1
              kind: BucketServerSideEncryptionConfiguration
              spec:
                forProvider:
                  bucketSelector:
                    matchControllerRef: true
                  rule:
                    - applyServerSideEncryptionByDefault:
                        - sseAlgorithm: aws:kms
                providerConfigRef:
                  name: aws-provider
