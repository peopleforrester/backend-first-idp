# ABOUTME: Composition for KubernetesNamespace — creates Namespace + RBAC + ResourceQuota.
# ABOUTME: Cloud-agnostic; uses Kubernetes provider, not a cloud provider.
# NOTE: Illustrative composition for the reference architecture.
# Connection-secret extraction (writeConnectionSecretToRef plumbing through
# managed resources) is intentionally not wired — this composition is for
# study, not for direct deployment to a real cluster.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: namespace-azure
  labels:
    provider: azure
    crossplane.io/xrd: xkubernetesnamespaces.platform.kubecon.io
spec:
  compositeTypeRef:
    apiVersion: platform.kubecon.io/v1alpha1
    kind: KubernetesNamespace
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: namespace
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Namespace
                    metadata:
                      labels:
                        platform.kubecon.io/managed: "true"
                providerConfigRef:
                  name: kubernetes-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.manifest.metadata.labels["team"]

          - name: resource-quota
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ResourceQuota
                    metadata:
                      name: team-quota
                    spec:
                      hard:
                        cpu: "4"
                        memory: 8Gi
                        pods: "50"
                providerConfigRef:
                  name: kubernetes-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cpuLimit
                toFieldPath: spec.forProvider.manifest.spec.hard.cpu
              - type: FromCompositeFieldPath
                fromFieldPath: spec.memoryLimit
                toFieldPath: spec.forProvider.manifest.spec.hard.memory

          - name: role-binding
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: rbac.authorization.k8s.io/v1
                    kind: RoleBinding
                    metadata:
                      name: team-admin
                    roleRef:
                      apiGroup: rbac.authorization.k8s.io
                      kind: ClusterRole
                      name: admin
                    subjects:
                      - kind: Group
                        apiGroup: rbac.authorization.k8s.io
                providerConfigRef:
                  name: kubernetes-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.manifest.subjects[0].name
