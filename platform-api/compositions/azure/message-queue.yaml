# ABOUTME: Azure Composition for MessageQueue — maps platform API to Service Bus.
# ABOUTME: Uses Pipeline mode with function-patch-and-transform and region mapping.
# NOTE: Illustrative composition for the reference architecture.
# Connection-secret extraction (writeConnectionSecretToRef plumbing through
# managed resources) is intentionally not wired — this composition is for
# study, not for direct deployment to a real cluster.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: message-queue-azure
  labels:
    provider: azure
    crossplane.io/xrd: xmessagequeues.platform.kubecon.io
spec:
  compositeTypeRef:
    apiVersion: platform.kubecon.io/v1alpha1
    kind: MessageQueue
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: servicebus-namespace
            base:
              apiVersion: servicebus.azure.upbound.io/v1beta2
              kind: ServiceBusNamespace
              spec:
                forProvider:
                  sku: Standard
                  resourceGroupNameSelector:
                    matchControllerRef: true
                providerConfigRef:
                  name: azure-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.location
                transforms:
                  - type: map
                    map:
                      eu-west-1: westeurope
                      eu-central-1: germanywestcentral
                      us-east-1: eastus
                      us-west-2: westus2
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.tags["team"]

          - name: servicebus-queue
            base:
              apiVersion: servicebus.azure.upbound.io/v1beta2
              kind: Queue
              spec:
                forProvider:
                  namespaceIdSelector:
                    matchControllerRef: true
                  enablePartitioning: false
                  maxDeliveryCount: 10
                  deadLetteringOnMessageExpiration: true
                  defaultMessageTtl: P4D
                providerConfigRef:
                  name: azure-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.fifo
                toFieldPath: spec.forProvider.requiresSession
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.id
                toFieldPath: status.endpoint
