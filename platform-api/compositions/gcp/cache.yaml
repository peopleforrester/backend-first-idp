# ABOUTME: GCP Composition for CacheInstance — maps platform API to Memorystore Redis.
# ABOUTME: Uses Pipeline mode with function-patch-and-transform and region mapping.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: cache-gcp
  labels:
    provider: gcp
    crossplane.io/xrd: xcacheinstances.platform.kubecon.io
spec:
  compositeTypeRef:
    apiVersion: platform.kubecon.io/v1alpha1
    kind: CacheInstance
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: memorystore-instance
            base:
              apiVersion: redis.gcp.upbound.io/v1beta2
              kind: Instance
              spec:
                forProvider:
                  tier: BASIC
                  memorySizeGb: 1
                  redisVersion: REDIS_7_2
                  transitEncryptionMode: SERVER_AUTHENTICATION
                  connectMode: PRIVATE_SERVICE_ACCESS
                providerConfigRef:
                  name: gcp-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.region
                transforms:
                  - type: map
                    map:
                      eu-west-1: europe-west1
                      eu-central-1: europe-west3
                      us-east-1: us-east1
                      us-west-2: us-west1
              - type: FromCompositeFieldPath
                fromFieldPath: spec.size
                toFieldPath: spec.forProvider.memorySizeGb
                transforms:
                  - type: map
                    map:
                      small: 1
                      medium: 4
                      large: 16
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.labels["team"]
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.host
                toFieldPath: status.endpoint
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.port
                toFieldPath: status.port
