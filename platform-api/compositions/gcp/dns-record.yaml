# ABOUTME: GCP Composition for DNSRecord — maps platform API to Cloud DNS.
# ABOUTME: Uses Pipeline mode with function-patch-and-transform.
# NOTE: Illustrative composition for the reference architecture.
# Connection-secret extraction (writeConnectionSecretToRef plumbing through
# managed resources) is intentionally not wired — this composition is for
# study, not for direct deployment to a real cluster.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: dns-record-gcp
  labels:
    provider: gcp
    crossplane.io/xrd: xdnsrecords.platform.kubecon.io
spec:
  compositeTypeRef:
    apiVersion: platform.kubecon.io/v1alpha1
    kind: DNSRecord
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: cloud-dns-record-set
            base:
              apiVersion: dns.gcp.upbound.io/v1beta2
              kind: RecordSet
              spec:
                forProvider:
                  managedZoneSelector:
                    matchLabels:
                      platform.kubecon.io/managed: "true"
                providerConfigRef:
                  name: gcp-provider
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.recordType
                toFieldPath: spec.forProvider.type
              - type: FromCompositeFieldPath
                fromFieldPath: spec.name
                toFieldPath: spec.forProvider.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.value
                toFieldPath: spec.forProvider.rrdatas[0]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.ttl
                toFieldPath: spec.forProvider.ttl
