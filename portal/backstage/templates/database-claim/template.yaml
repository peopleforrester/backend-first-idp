# ABOUTME: Backstage Software Template for requesting a managed database.
# ABOUTME: Generates DatabaseInstanceClaim YAML and opens a PR to the platform repo.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: database-claim
  title: Request a Database
  description: Provision a managed PostgreSQL or MySQL database through the platform API.
  tags:
    - platform
    - database
    - crossplane
spec:
  owner: platform-team
  type: resource-claim
  parameters:
    - title: Database Configuration
      required:
        - team
        - size
        - region
      properties:
        team:
          title: Team
          type: string
          description: Your team name
          enum:
            - checkout
            - payments
            - analytics
            - platform
            - identity
            - catalog
            - shipping
            - notifications
            - inventory
            - search
            - billing
            - marketing
        name:
          title: Claim Name
          type: string
          description: "Name for this database (default: {team}-db)"
        size:
          title: Instance Size
          type: string
          enum:
            - small
            - medium
            - large
          default: small
          description: "small: dev/test, medium: standard prod, large: high-traffic prod"
        region:
          title: Region
          type: string
          enum:
            - eu-west-1
            - eu-central-1
            - us-east-1
            - us-west-2
          default: eu-west-1
        engine:
          title: Engine
          type: string
          enum:
            - postgres
            - mysql
          default: postgres
        highAvailability:
          title: High Availability
          type: boolean
          default: false
          description: Enable multi-AZ failover (required for production)
        backupRetentionDays:
          title: Backup Retention (days)
          type: number
          default: 7
          description: 1-35 days (minimum 7 for production)

  steps:
    - id: generate
      name: Generate Claim YAML
      action: fetch:template
      input:
        url: ./skeleton
        values:
          team: ${{ parameters.team }}
          name: ${{ parameters.name | default(parameters.team + '-db') }}
          size: ${{ parameters.size }}
          region: ${{ parameters.region }}
          engine: ${{ parameters.engine }}
          highAvailability: ${{ parameters.highAvailability }}
          backupRetentionDays: ${{ parameters.backupRetentionDays }}

    - id: publish
      name: Open Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=backend-first-idp&owner=peopleforrester
        title: "platform: request database ${{ parameters.name | default(parameters.team + '-db') }}"
        branchName: "claim/${{ parameters.team }}/${{ parameters.name | default(parameters.team + '-db') }}"
        description: |
          ## Database Claim

          | Field | Value |
          |-------|-------|
          | Team | ${{ parameters.team }} |
          | Size | ${{ parameters.size }} |
          | Region | ${{ parameters.region }} |
          | Engine | ${{ parameters.engine }} |
          | HA | ${{ parameters.highAvailability }} |
          | Backup | ${{ parameters.backupRetentionDays }} days |

          Generated by Backstage Software Template.
        targetPath: teams/${{ parameters.team }}/claims

  output:
    links:
      - title: Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Team Claims Directory
        url: https://github.com/peopleforrester/backend-first-idp/tree/main/teams/${{ parameters.team }}/claims
