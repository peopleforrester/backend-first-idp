apiVersion: platform.kubecon.io/v1alpha1
kind: CDNDistributionClaim
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.team }}
  labels:
    team: ${{ values.team }}
spec:
  team: ${{ values.team }}
  originDomain: ${{ values.originDomain }}
  cacheTtlSeconds: ${{ values.cacheTtlSeconds }}
