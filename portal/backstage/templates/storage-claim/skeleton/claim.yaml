apiVersion: platform.kubecon.io/v1alpha1
kind: ObjectStorageClaim
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.team }}
  labels:
    team: ${{ values.team }}
spec:
  region: ${{ values.region }}
  team: ${{ values.team }}
  versioning: ${{ values.versioning }}
  encryption: ${{ values.encryption }}
