apiVersion: platform.kubecon.io/v1alpha1
kind: MessageQueueClaim
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.team }}
  labels:
    team: ${{ values.team }}
spec:
  region: ${{ values.region }}
  team: ${{ values.team }}
  fifo: ${{ values.fifo }}
  deadLetterQueue: ${{ values.deadLetterQueue }}
